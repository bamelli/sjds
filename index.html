<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول</title>

  <style>
    * { box-sizing: border-box; font-family: Arial; }
    body {
      margin: 0;
      background: #f3f3f7;
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .page { width: 100%; max-width: 420px; }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 18px;
      margin-bottom: 16px;
    }

    .phone-box {
      display: flex;
      height: 70px;
      border: 1px solid #ccc;
      border-radius: 16px;
      overflow: hidden;
    }

    input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 18px;
      padding: 0 12px;
      text-align: right;
    }

    .country-btn {
      width: 140px;
      border: none;
      border-left: 1px solid #ccc;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
    }

    .flag-img {
      width: 26px;
      height: 18px;
      border-radius: 3px;
    }

    .next-btn {
      width: 100%;
      height: 65px;
      border-radius: 16px;
      border: none;
      background: #aaa;
      color: #333;
      font-size: 22px;
    }

    .next-btn.active {
      background: #111;
      color: #fff;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal.show { display: flex; }

    .modal-box {
      width: 100%;
      max-width: 400px;
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
    }

    .country-item {
      width: 100%;
      padding: 12px;
      border: none;
      background: #fff;
      display: flex;
      justify-content: space-between;
      cursor: pointer;
    }

    .country-item:hover { background: #eee; }

  </style>
</head>

<body>

<div class="page">

  <h2 style="text-align:center;">تسجيل الدخول أو التسجيل</h2>

  <div class="card">
    <label>رقم الموبايل</label>

    <div class="phone-box">
      <input id="phone" placeholder="أدخل رقم الموبايل" />

      <button class="country-btn" onclick="openModal()">
        <span id="code">+964</span>
        <img id="flag" class="flag-img" src="https://flagcdn.com/w40/iq.png" />
      </button>
    </div>
  </div>

  <button id="next" class="next-btn">التالي</button>

</div>

<!-- modal -->
<div id="modal" class="modal">
  <div class="modal-box">
    <input id="search" placeholder="بحث..." style="width:100%;padding:10px;border:none;border-bottom:1px solid #ccc;">
    <div id="list"></div>
  </div>
</div>

<script>

const countries = [
{ name:"العراق", code:"+964", flag:"https://flagcdn.com/w40/iq.png"},
{ name:"السعودية", code:"+966", flag:"https://flagcdn.com/w40/sa.png"},
{ name:"الكويت", code:"+965", flag:"https://flagcdn.com/w40/kw.png"},
{ name:"الأردن", code:"+962", flag:"https://flagcdn.com/w40/jo.png"},
{ name:"مصر", code:"+20", flag:"https://flagcdn.com/w40/eg.png"},
{ name:"عُمان", code:"+968", flag:"https://flagcdn.com/w40/om.png"},
{ name:"ليبيا", code:"+218", flag:"https://flagcdn.com/w40/ly.png"},
{ name:"اليمن", code:"+967", flag:"https://flagcdn.com/w40/ye.png"},
{ name:"فلسطين", code:"+970", flag:"https://flagcdn.com/w40/ps.png"},
{ name:"فلسطين", code:"+972", flag:"https://flagcdn.com/w40/ps.png"},
{ name:"الإمارات", code:"+971", flag:"https://flagcdn.com/w40/ae.png"},
{ name:"قطر", code:"+974", flag:"https://flagcdn.com/w40/qa.png"},
{ name:"لبنان", code:"+961", flag:"https://flagcdn.com/w40/lb.png"},
{ name:"موريتانيا", code:"+222", flag:"https://flagcdn.com/w40/mr.png"},
{ name:"البحرين", code:"+973", flag:"https://flagcdn.com/w40/bh.png"},
{ name:"الجزائر", code:"+213", flag:"https://flagcdn.com/w40/dz.png"},
{ name:"المغرب", code:"+212", flag:"https://flagcdn.com/w40/ma.png"},
{ name:"تونس", code:"+216", flag:"https://flagcdn.com/w40/tn.png"},
{ name:"تركيا", code:"+90", flag:"https://flagcdn.com/w40/tr.png"},
{ name:"سوريا", code:"+963", flag:"https://flagcdn.com/w40/sy.png"}
];

let selected = countries[0];

const list = document.getElementById("list");
const modal = document.getElementById("modal");

function render(data){
  list.innerHTML="";
  data.forEach(c=>{
    const btn=document.createElement("button");
    btn.className="country-item";
    btn.innerHTML=`
      <span>${c.name}</span>
      <span>
        ${c.code}
        <img class="flag-img" src="${c.flag}">
      </span>
    `;
    btn.onclick=()=>{
      selected=c;
      document.getElementById("code").innerText=c.code;
      document.getElementById("flag").src=c.flag;
      modal.classList.remove("show");
    };
    list.appendChild(btn);
  });
}

function openModal(){
  modal.classList.add("show");
}

modal.onclick=(e)=>{
  if(e.target===modal) modal.classList.remove("show");
};

document.getElementById("search").oninput=(e)=>{
  const val=e.target.value;
  render(countries.filter(c=>c.name.includes(val)||c.code.includes(val)));
};

document.getElementById("phone").oninput=(e)=>{
  let v=e.target.value.replace(/\D/g,"");
  e.target.value=v;

  const btn=document.getElementById("next");
  if(v.length>=7){
    btn.classList.add("active");
  }else{
    btn.classList.remove("active");
  }
};

render(countries);

</script>

</body>
</html>
